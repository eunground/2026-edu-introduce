<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유주 자기소개</title>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <header>
        <!--1. 페이지 제목 & 나를 표현하는 해시태그 작성-->
        <h2>유주의 페이지</h2>
        <p>#유주 #이유주 #짱짱맨</p>
    </header>

    <div class="container">

        <aside>
            <!--2. 내 사진 이미지 삽입-->
         <img src="../images/유주 사진.png" alt="내 사진" width="200" hight="300">


            <!--3. 본인 정보 작성 (이름, 학년 등)-->
            <h3></h3>
            <p>신원중학교 2학년 </p>

            <!--봄, 여름, 가을, 겨울 이야기 이름 변경 자유롭게! 이모티콘은 윈도우 + ; 키 누르면 됩니다-->
            <nav>
                <a href="spring.html">🌸 1분기 이야기</a>
                <a href="summer.html">🌿 2분기 이야기</a>
                <a href="autumn.html">🍁 3분기 이야기</a>
                <a href="winter.html">☃️ 4분기 이야기</a>
            </nav>
        </aside>

        <!--아래 내용은 예시로, 본인 만의 개성을 담아 자유롭게 작성해보세요!-->
        <main>
            <section>
                <!--4. 자기소개 작성-->
                <h2>자기소개</h2>
                <p>이유주 입니다.</p>
            </section>

            <article>
                <!--5. 내가 즐거운 순간-->
                <h2>내가 즐거운 순간</h2>
                <p>침대에 박혀있을 때</p>
            </article>

            <article>
                <!--6. 내가 좋아하는 3가지 (목록 사용하기!)-->
                <h2>내가 좋아하는 3가지</h2>
                <ul>
                    <li>호랑이</li>
                    <li>애니메이션</li>
                    <li>맛있는 거</li>
                </ul>
            </article>

            <article>
                <!--7. 자신있게 얘기할 수 있는 나만의 장점은?-->
                <h2>나의 장점</h2>
                <p>모르겠어요</p>
            </article>

            <article>
                <!--8. 나의 올해 목표-->
                <h2>올해의 목표</h2>
                <p><ins>사람처럼</ins> 살기</p>
            </article>

            <!--이 밖에 추가적으로 작성하고 싶은 것들이 있다면 자유롭게 작성해보세요!-->
        </main>

    </div>

    <!--아래 footer 부분은 수정하지 마세요!-->
    <footer>
        <a href="../../통합/html/home.html">← 반 전체 페이지로</a>
    </footer>
</body>

</html>
