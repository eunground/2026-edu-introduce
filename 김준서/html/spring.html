<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <title>1분기 활동</title>
    <!--외부 스타일 시트 연결하기 (season.css 파일)-->
    <link rel="stylesheet" href="../css/season.css">
    <style>
        section div img {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <a href="./index.html">← 내 페이지로</a>
        <h1>1분기 활동</h1>
        <p>1분기에 진행한 활동 사진을 모아봤어요.</p> <!--내용 자유롭게 바꿔도 됩니다-->
    </header>

    <main>
        <section>
            <div>
                <img src="../images/봄1.jpg" alt="활동 사진 1" class="gallery-img"> <!--alt는 사진 설명 (화면에는 안 보임)-->
                <p>큰절 받으세요</p> <!--사진 한 줄 설명-->
            </div>

            <div>
                <img src="../images/봄2.jpg" alt="활동 사진 2" class="gallery-img">
                <p>안녕</p>
            </div>

            <div>
                <img src="../images/봄3.jpg" alt="활동 사진 3" class="gallery-img">
                <p>체력 회복중</p>
            </div>

            <div>
                <img src="../images/봄4.jpg" alt="활동 사진 4" class="gallery-img">
                <p>산 봉우리</p>
            </div>

            <div>
                <img src="../images/봄5.jpg" alt="활동 사진 2" class="gallery-img">
                <p>코가 가려워</p>
            </div>

            <div>
                <img src="../images/봄6.jpg" alt="활동 사진 2" class="gallery-img">
                <p>티라노</p>
            </div>

            <div>
                <img src="../images/봄7.jpg" alt="활동 사진 2" class="gallery-img">
                <p>너무 높아</p>
            </div>

            <div>
                <img src="../images/봄8.jpg" alt="활동 사진 2" class="gallery-img">
                <p>위플레시</p>
            </div>

            <div>
                <img src="../images/봄9.jpg" alt="활동 사진 2" class="gallery-img">
                <p>너의 이름은</p>
            </div>

            <div>
                <img src="../images/봄10.jpg" alt="활동 사진 2" class="gallery-img">
                <p>집가고 싶다</p>
            </div>
            
        
    </main>

    <footer>
        <a href="../../통합/html/home.html">반 전체 페이지로</a>
    </footer>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('fullImage');
        const closeBtn = document.getElementsByClassName("close")[0];

        const images = document.querySelectorAll('.gallery-img');

        images.forEach(img => {
            img.addEventListener('click', function () {
                modal.style.display = "flex";
                modalImg.src = this.src;
            });
        });

        closeBtn.onclick = function () {
            modal.style.display = "none";
        }

        modal.onclick = function (event) {
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>

</html>
