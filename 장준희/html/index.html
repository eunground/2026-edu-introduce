<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장준희의 페이지</title>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <header>
        <!--1. 소개합니다. & 나를 표현하는 해시태그 작성. #-->
        <h2><b>소개합니다.</b></h2>
        <b>나를 표현하는 해시태그. #딱</b>
    </header>

    <div class="container">

        <aside>
            <!--2. 내 사진 이미지 삽입-->
            <img src="다운로드.jpg" alt="나">

            <!--border-radius: 50%; 사진 둥글게 하기, 선택 사항-->

            <!--3. 본인 정보 작성 (이름, 학년 등)-->
            <h4>장준희</h4>
            <a>역곡중학교 2학년</a>

            <!--봄, 여름, 가을, 겨울 이야기 이름 변경 자유롭게! 이모티콘은 윈도우 + ; 키 누르면 됩니다-->
            <nav>
                <a href="spring.html">🌸 1분기 이야기</a>
                <a href="summer.html">🌿 2분기 이야기</a>
                <a href="autumn.html">🍁 3분기 이야기</a>
                <a href="winter.html">☃️ 4분기 이야기</a>
            </nav>
        </aside>

        <!--아래 내용은 예시로, 본인 만의 개성을 담아 자유롭게 작성해보세요!-->
        <main>
            <section>
                <!--4. 자기소개 작성-->
                <h3>자기소개</h3>
                <a>안녕하세요 15살 장준희입니다.</a>
            </section>

            <article>
                <!--5. 내가 즐거운 순간-->
                <h3>내가 즐거운 순간</h3>
                <a>자기 전, 게임할때</a>
            </article>

            <article>
                <!--6. 내가 좋아하는 3가지 (목록 사용하기!)-->
                <h3>내가 좋아하는 3가지</h3>
                <a>1. 게임하는것</a>
                <a>2. 잘때</a>
                <a>3. 늦게 일어나기</a>
            </article>

            <article>
                <!--7. 자신있게 얘기할 수 있는 나만의 장점은?-->
                <h3>자신있게 얘기할수있는 나만의 장점은?</h3>
                <a>누구 한명보다는 키가 크다</a>
            </article>

            <article>
                <!--8. 나의 올해 목표-->
                <h3>나의 올해 목표</h3>
                <a>다야찍기</a>
            </article>

            <!--이 밖에 추가적으로 작성하고 싶은 것들이 있다면 자유롭게 작성해보세요!-->
        </main>

    </div>

    <!--아래 footer 부분은 수정하지 마세요!-->
    <footer>
        <a href="../../통합/html/home.html">← 반 전체 페이지로</a>
    </footer>
</body>

</html>
