<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김정건의 페이지</title>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <header>
        <!--1. 페이지 제목 & 나를 표현하는 해시태그 작성-->
        <h2>김정건을 소개합니다</h2>
        <p>나를 표현하는 해시태그. #부지런한</p>
    </header>

    <div class="container">

        <aside>
            <!--2. 내 사진 이미지 삽입-->
            <img src="../images/자기소개.jpeg" alt="내 사진">
            <!--border-radius: 50%; 사진 둥글게 하기, 선택 사항-->

            <!--3. 본인 정보 작성 (이름, 학년 등)-->
            <h2>3학년 김정건</h2>

            <!--봄, 여름, 가을, 겨울 이야기 이름 변경 자유롭게! 이모티콘은 윈도우 + ; 키 누르면 됩니다-->
            <nav>
                <a href="spring.html">🌸 1분기 활동</a>
                <a href="summer.html">🌿 2분기 활동</a>
                <a href="autumn.html">🍁 3분기 활동</a>
                <a href="winter.html">☃️ 4분기 활동</a>
            </nav>
        </aside>

        <!--아래 내용은 예시로, 본인 만의 개성을 담아 자유롭게 작성해보세요!-->
        <main>
            <section>
                <!--4. 자기소개 작성-->
                <h2>나를 소개합니다</h2>
                <p>안녕하세요 3학년 김정건입니다</p>
            </section>

            <article>
                <!--8. 나의 올해 목표-->
            </article>

            <article>
                <!--5. 내가 즐거운 순간-->
                <h2>내가 좋아하는 것</h2>
                <p>저는 떡볶이를 좋아합니다</p>
            </article>

            <article>
                <!--6. 내가 좋아하는 3가지 (목록 사용하기!)-->
            </article>

            <article>
                <!--7. 자신있게 얘기할 수 있는 나만의 장점은?-->
                <h2>나만의 장점</h2>
                <p>저는 농구를 잘해요</p>
            </article>

            <!--이 밖에 추가적으로 작성하고 싶은 것들이 있다면 자유롭게 작성해보세요!-->
        </main>

    </div>

    <!--아래 footer 부분은 수정하지 마세요!-->
    <footer>
        <a href="../../통합/html/home.html">← 반 전체 페이지로</a>
    </footer>

</html>
